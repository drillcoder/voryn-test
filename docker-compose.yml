x-app-env: &app-env
  DB_URL: postgres://user:pass@postgres:5432/voryn
  ETH_RPC_URL: https://ethereum-rpc.publicnode.com
  ETH_CHAIN_ID: 1

x-app: &app
  image: voryn-test-app:local
  build:
    context: .
    dockerfile: docker/app/Dockerfile
  environment: *app-env
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: voryn
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=30
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-voryn}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  head:
    <<: *app
    command: [ "node", "src/eth/head.js" ]

  fetch:
    <<: *app
    command: [ "node", "src/eth/fetch.js" ]

  sequencer:
    <<: *app
    command: [ "node", "src/eth/sequencer.js" ]

  retention:
    <<: *app
    command: [ "node", "src/eth/retention.js" ]

  transaction-reaction:
    <<: *app
    command: [ "node", "src/eth/transaction-reaction.js" ]

  event-reaction:
    <<: *app
    command: [ "node", "src/eth/event-reaction.js" ]

  metrics:
    <<: *app
    command: [ "node", "src/metrics.js" ]
    environment:
      <<: *app-env
      PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    environment:
      GRAFANA_CLOUD_PROM_REMOTE_WRITE_URL: ${GRAFANA_CLOUD_PROM_REMOTE_WRITE_URL}
      GRAFANA_CLOUD_PROM_USERNAME: ${GRAFANA_CLOUD_PROM_USERNAME}
      GRAFANA_CLOUD_API_TOKEN: ${GRAFANA_CLOUD_API_TOKEN}
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      - metrics
    restart: unless-stopped

volumes:
  postgres_data:
