x-app-env: &app-env
  NODE_ENV: production
  DB_URL: postgres://user:pass@postgres:5432/voryn
  ETH_CHAIN_ID: 1
  ETH_RPC_URL: https://ethereum-rpc.publicnode.com
  BSC_CHAIN_ID: 56
  BSC_RPC_URL: https://bsc-rpc.publicnode.com

x-app: &app
  image: node:24-bookworm-slim
  working_dir: /app
  environment: *app-env
  volumes:
    - ./package.json:/app/package.json:ro
    - ./src:/app/src:ro
    - ./node_modules:/app/node_modules:ro
  depends_on:
    app-deps:
      condition: service_completed_successfully
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  app-deps:
    image: node:24-bookworm-slim
    working_dir: /app
    environment:
      NODE_ENV: production
    command: [ "npm", "ci", "--omit=dev" ]
    volumes:
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./node_modules:/app/node_modules
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: voryn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-voryn}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  eth-head:
    <<: *app
    command: [ "node", "src/eth/head.js" ]

  eth-fetch:
    <<: *app
    command: [ "node", "src/eth/fetch.js" ]

  eth-sequencer:
    <<: *app
    command: [ "node", "src/eth/sequencer.js" ]

  eth-retention:
    <<: *app
    command: [ "node", "src/eth/retention.js" ]

  eth-transaction-reaction:
    <<: *app
    command: [ "node", "src/eth/transaction-reaction.js" ]

  eth-event-reaction:
    <<: *app
    command: [ "node", "src/eth/event-reaction.js" ]

  eth-block-job-recovery:
    <<: *app
    profiles: [ "tools" ]
    entrypoint: [ "node", "src/eth/block-job-recovery.js" ]
    restart: "no"

  bsc-head:
    <<: *app
    command: [ "node", "src/bsc/head.js" ]

  bsc-fetch:
    <<: *app
    command: [ "node", "src/bsc/fetch.js" ]

  bsc-sequencer:
    <<: *app
    command: [ "node", "src/bsc/sequencer.js" ]

  bsc-retention:
    <<: *app
    command: [ "node", "src/bsc/retention.js" ]

  bsc-transaction-reaction:
    <<: *app
    command: [ "node", "src/bsc/transaction-reaction.js" ]

  bsc-event-reaction:
    <<: *app
    command: [ "node", "src/bsc/event-reaction.js" ]

  bsc-block-job-recovery:
    <<: *app
    profiles: [ "tools" ]
    entrypoint: [ "node", "src/bsc/block-job-recovery.js" ]
    restart: "no"

  metrics:
    <<: *app
    command: [ "node", "src/metrics.js" ]
    environment:
      <<: *app-env
      PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    environment:
      GRAFANA_CLOUD_PROM_REMOTE_WRITE_URL: ${GRAFANA_CLOUD_PROM_REMOTE_WRITE_URL}
      GRAFANA_CLOUD_PROM_USERNAME: ${GRAFANA_CLOUD_PROM_USERNAME}
      GRAFANA_CLOUD_API_TOKEN: ${GRAFANA_CLOUD_API_TOKEN}
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      - metrics
    restart: unless-stopped

volumes:
  postgres_data:
